# This file configures Charmcraft.
# See https://documentation.ubuntu.com/charmcraft/stable/reference/files/charmcraft-yaml-file/
type: charm
name: test-observer-api
title: Test Observer API
summary: A charmed operator for Test Observer's FastAPI backend.
description: |
  Test Observer is a tool to track test results of artefacts across environments.

  A user interested in testing an artefact
  across different environments (e.g. particular machines or cloud setups)
  can use Test Observer as means for storing, viewing and comparing results
  with previous runs or versions of an artefact.
  The last use case is particularly useful for catching regressions.
  Additionally, Test Observer provides a mechanism
  to assign reviewers that can look at test results
  and mark artefacts as approved or rejected based on those test results.
  It is important to note that Test Observer does not run the tests itself,
  but provides an API with which users can report the results of those tests.

  This charm operates the FastAPI-based backend for Test Observer to enable
  easy deployment and management of the service in a Juju model.
  Integrating with the database, ingress, and observability becomes simplified through Juju.

# Documentation:
# https://documentation.ubuntu.com/charmcraft/stable/howto/build-guides/select-platforms/
base: ubuntu@22.04
platforms:
  amd64:
  arm64:

assumes:
  - juju >= 3.6
  - k8s-api

parts:
  charm:
    plugin: uv
    source: .
    build-snaps:
      - astral-uv

# Configuration options for the charm
# This config section defines charm config options, and populates the Configure
# tab on Charmhub.
# More information on this section at:
# https://documentation.ubuntu.com/charmcraft/stable/reference/files/charmcraft-yaml-file/#config
# General configuration documentation:
# https://documentation.ubuntu.com/juju/3.6/reference/configuration/#application-configuration
config:
  options:
    # An example config option to customise the log level of the workload
    log-level:
      description: |
        Configures the log level of uvicorn.

        Acceptable values are: "info", "debug", "warning", "error" and "critical"
      default: "info"
      type: string

# Workload containers
# https://documentation.ubuntu.com/charmcraft/stable/reference/files/charmcraft-yaml-file/#containers
containers:
  api:
    resource: api-image
  celery:
    resource: api-image

# This field populates the Resources tab on Charmhub.
# https://documentation.ubuntu.com/charmcraft/stable/reference/files/charmcraft-yaml-file/#resources
resources:
  # An OCI image resource for each container listed above.
  # You may remove this if your charm will run without a workload sidecar container.
  api-image:
    type: oci-image
    description: OCI image for the `api` and `celery` containers
    # The upstream-source field is ignored by Charmcraft and Juju, but it can be
    # useful to developers in identifying the source of the OCI image.  It is also
    # used by the 'canonical/charming-actions' GitHub action for automated releases.
    # The test_deploy function in tests/integration/test_charm.py reads upstream-source
    # to determine which OCI image to use when running the charm's integration tests.
    upstream-source: ghcr.io/canonical/test_observer/api:latest

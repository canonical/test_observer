services:
  test-observer-api:
    image: test-observer-api
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "30000:30000"
    depends_on:
      test-observer-db:
        condition: service_healthy
      saml-idp:
        condition: service_healthy
    environment:
      DB_URL: "postgresql+pg8000://test_observer_user:test_observer_password@test-observer-db:5432/test_observer_db"
      SAML_IDP_METADATA_URL: "http://saml-idp/simplesaml/saml2/idp/metadata.php"
      SEED_DATA: "true"
      DISABLE_PERIODIC_TASKS: "${DISABLE_PERIODIC_TASKS:-false}" # Can be overridden for GitHub CI
      UV_DYNAMIC_VERSIONING_BYPASS: "0.0.0" # this is to be set at image build time for production images
      PYTHONDONTWRITEBYTECODE: "1" # Prevent .pyc files in development
      SESSIONS_HTTPS_ONLY: "false"
      REQUIRE_AUTHENTICATION: "${REQUIRE_AUTHENTICATION:-false}"
      IGNORE_PERMISSIONS: "${IGNORE_PERMISSIONS:-view_user,change_user,view_team,change_team,add_application,change_application,view_application,view_permission,view_issue,change_issue,change_issue_attachment,change_issue_attachment_bulk,change_attachment_rule,change_auto_rerun,view_test,change_test,view_rerun,change_rerun,change_rerun_bulk,view_artefact,change_artefact,view_environment_review,change_environment_review,view_report,view_test_case_reported_issue,change_test_case_reported_issue,view_environment_reported_issue,change_environment_reported_issue,view_notification,change_notification}"
      USE_LOCAL_LOGIN: "${USE_LOCAL_LOGIN:-true}"
    volumes:
      # Mount source code from host for development
      - ./backend:/home/app
      # Preserve virtual environment in anonymous volume
      - /home/app/.venv

  test-observer-frontend:
    image: test-observer-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "30001:80" # Adjust the port mapping as needed
    depends_on:
      test-observer-api:
        condition: service_healthy
      saml-idp:
        condition: service_healthy
    volumes:
      # Mount source code from host for development (enables live code changes)
      - ./frontend:/app
      # Preserve container-managed build artifacts / package config so they
      # don't clash with the host's (potentially different-platform) versions.
      - /app/.dart_tool
      - /app/build
    # The dev container starts instantly but Flutter needs time to compile
    # before it serves on :80. This healthcheck lets `docker compose up --wait`
    # (used locally and in the test_docker_compose CI workflow) block until the
    # app is actually being served, rather than merely "running".
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:80/ || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      # Generous start_period: the very first `flutter run` compilation can take
      # ~30-60s (longer on a cold pub cache). Failures during this window don't
      # count against the retry budget.
      start_period: 180s

  test-observer-db:
    image: docker.io/postgres:14
    environment:
      POSTGRES_USER: test_observer_user
      POSTGRES_PASSWORD: test_observer_password
      POSTGRES_DB: test_observer_db
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U test_observer_user -d test_observer_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  saml-idp:
    image: docker.io/cirrusid/simplesamlphp:v2.5.0
    ports:
      - "8080:80"
    volumes:
      - ./backend/saml/simplesamlphp/cert:/var/simplesamlphp/cert
      - ./backend/saml/simplesamlphp/authsources.php:/var/simplesamlphp/config/authsources.php
      - ./backend/saml/simplesamlphp/config-override.php:/var/simplesamlphp/config/config-override.php
      - ./backend/saml/simplesamlphp/saml20-idp-hosted.php:/var/simplesamlphp/metadata/saml20-idp-hosted.php
      - ./backend/saml/simplesamlphp/saml20-sp-remote.php:/var/simplesamlphp/metadata/saml20-sp-remote.php
      - ./backend/saml/simplesamlphp/apache-http.conf:/etc/apache2/sites-enabled/000-default.conf
      - ./backend/saml/simplesamlphp/generate-certs.sh:/opt/simplesaml/run-on-start.sh
    environment:
      SSP_ADMIN_PASSWORD: "${SSP_ADMIN_PASSWORD:-secret1}"
      SSP_APACHE_ALIAS: "simplesaml/"
      SSP_BASE_URL_PATH: "http://localhost:8080/simplesaml/"
      SSP_ENABLE_IDP: "true"
      SSP_SECRET_SALT: "${SSP_SECRET_SALT:-mysalt}"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost/simplesaml/saml2/idp/metadata.php || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  db_data:

name: Publish Frontend

on:
  push:
    branches:
      - main
      - 'testing/**'
    tags: ["v*.*.*"]
    paths:
      - 'frontend/**'
      - '.github/workflows/publish_frontend.yml'

env:
  REGISTRY: ghcr.io

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build-and-push-frontend-image:
    name: Build and Push Frontend Image
    runs-on: [self-hosted, linux, jammy, x64]
    permissions:
      contents: read
      packages: write # Needed to publish Docker image

    env:
      IMAGE_NAME: ${{ github.repository }}/frontend

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["https://github-runner-dockerhub-cache.canonical.com:5000"]

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Determine tag
        id: tag
        run: |
          # Sanitize branch name (replace / with -)
          BRANCH="${GITHUB_REF#refs/heads/}"
          SANITIZED="$(echo "$BRANCH" | tr '/' '-' | tr '[:upper:]' '[:lower:]')"
          
          if [ "$BRANCH" = "main" ]; then
            echo "name=main" >> $GITHUB_OUTPUT
          else
            echo "name=$SANITIZED" >> $GITHUB_OUTPUT
          fi
          echo "Docker tag: $(grep name $GITHUB_OUTPUT | cut -d= -f2)"

      - name: Log in to the Container registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # Ignoring until we set up environments
          password: ${{ secrets.GITHUB_TOKEN }} # zizmor: ignore[secrets-outside-env]

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.name }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-and-push-frontend-charm:
    name: Build and Push Frontend Charm
    needs: build-and-push-frontend-image
    runs-on: [self-hosted, linux, xlarge, jammy, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Determine channel
        id: channel
        run: |
          # Sanitize branch name for Charmhub (replace / with -)
          BRANCH="${GITHUB_REF#refs/heads/}"
          SANITIZED="$(echo "$BRANCH" | tr '/' '-' | tr '[:upper:]' '[:lower:]')"
          
          if [ "$BRANCH" = "main" ]; then
            echo "name=latest/edge" >> $GITHUB_OUTPUT
            echo "tag=main" >> $GITHUB_OUTPUT
          else
            echo "name=latest/edge/$SANITIZED" >> $GITHUB_OUTPUT
            echo "tag=$SANITIZED" >> $GITHUB_OUTPUT
          fi
          echo "Publishing to: $(grep name $GITHUB_OUTPUT | cut -d= -f2)"

      - name: Update OCI image reference in charmcraft.yaml
        env:
          TAG: ${{ steps.channel.outputs.tag }}
        run: |
          sed -i "s|ghcr.io/canonical/test_observer/frontend:main|ghcr.io/canonical/test_observer/frontend:${TAG}|g" frontend/charm/charmcraft.yaml
          echo "Updated charmcraft.yaml to use image tag: ${TAG}"
          grep "upstream-source" frontend/charm/charmcraft.yaml

      - name: Upload charm to charmhub
        # The version seems to really apply to the whole repo, rather than this specific action
        uses: canonical/charming-actions/upload-charm@1753e0803f70445132e92acd45c905aba6473225 # v2.7.0
        with:
          charm-path: "frontend/charm"
          # Ignoring until we set up environments
          credentials: "${{ secrets.CHARMHUB_TOKEN }}" # zizmor: ignore[secrets-outside-env]
          github-token: "${{ secrets.GITHUB_TOKEN }}" # zizmor: ignore[secrets-outside-env]
          tag-prefix: "frontend"
          channel: "${{ steps.channel.outputs.name }}"

      - name: Check logs for failure
        if: failure()
        shell: bash
        run: |
          LOG_FILE=$(sudo find /root $HOME /tmp /var/tmp -name "charmcraft-*.log" 2>/dev/null | head -1)
          if [ -n "$LOG_FILE" ]; then
            sudo cat "$LOG_FILE"
          else
            echo "No charmcraft log file found in /root, $HOME, /tmp, or /var/tmp"
          fi

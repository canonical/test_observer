name: Create Candidate

on:
  workflow_dispatch:
    inputs:
      candidate_tag:
        description: 'Candidate tag name (e.g., candidate/1.2.3-rc1)'
        required: true

permissions: {}

jobs:
  create-candidate-tag:
    name: Create Candidate Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Validate candidate tag format
        run: |
          TAG="${{ github.event.inputs.candidate_tag }}"
          if ! [[ $TAG =~ ^candidate/[0-9]+\.[0-9]+\.[0-9]+-rc[0-9]+$ ]]; then
            echo "Error: Invalid candidate tag format: $TAG"
            echo "Expected format: candidate/a.b.c-rcD (e.g., candidate/1.2.3-rc1)"
            exit 1
          fi
          echo "Tag format validated: $TAG"

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          persist-credentials: false

      - name: Create and push candidate tag
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git tag ${{ github.event.inputs.candidate_tag }}
          git push origin ${{ github.event.inputs.candidate_tag }}

  send-to-charmhub:
    name: Send to Charmhub
    runs-on: [self-hosted, linux, xlarge, jammy, x64]
    needs: create-candidate-tag
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.inputs.candidate_tag }}
          persist-credentials: false

      - name: Pack API charm
        run: |
          cd backend/charm
          charmcraft pack

      - name: Pack Frontend charm
        run: |
          cd frontend/charm
          charmcraft pack

      - name: Release charms to Charmhub
        run: |
          # Ensure we're on the candidate tag
          TAG="${{ github.event.inputs.candidate_tag }}"
          git checkout $TAG
          
          # Login to Charmhub using credentials
          echo "${{ secrets.CHARMHUB_TOKEN }}" | charmcraft login --verbose
          
          # Release API charm to candidate channel
          API_REVISION=$(charmcraft revisions test-observer-api | head -2 | tail -1 | awk '{print $1}')
          charmcraft release test-observer-api --revision=$API_REVISION --channel=latest/candidate
          echo "Released test-observer-api revision $API_REVISION to Charmhub candidate channel"
          
          # Release Frontend charm to candidate channel
          FRONTEND_REVISION=$(charmcraft revisions test-observer-frontend | head -2 | tail -1 | awk '{print $1}')
          charmcraft release test-observer-frontend --revision=$FRONTEND_REVISION --channel=latest/candidate
          echo "Released test-observer-frontend revision $FRONTEND_REVISION to Charmhub candidate channel"

  deploy-to-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: create-candidate-tag
    permissions:
      contents: read

    steps:
      - name: Trigger staging refresh workflow
        run: |
          # Trigger the refresh-test-observer-staging workflow in canonical/certification-ops
          gh workflow run refresh-test-observer-staging.yaml \
            --repo canonical/certification-ops \
            --ref main
          
          echo "Triggered Test Observer staging refresh"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}


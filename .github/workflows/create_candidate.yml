name: Create Candidate

on:
  workflow_dispatch:
    inputs:
      candidate_tag:
        description: 'Candidate tag name (e.g., candidate/1.2.3-rc1)'
        required: true

permissions: {}

jobs:
  create-candidate-tag:
    name: Create Candidate Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Validate candidate tag format
        run: |
          TAG="${{ github.event.inputs.candidate_tag }}"
          if ! [[ $TAG =~ ^candidate/[0-9]+\.[0-9]+\.[0-9]+-rc[0-9]+$ ]]; then
            echo "Error: Invalid candidate tag format: $TAG"
            echo "Expected format: candidate/a.b.c-rcD (e.g., candidate/1.2.3-rc1)"
            exit 1
          fi
          echo "Tag format validated: $TAG"

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          persist-credentials: false

      - name: Create and push candidate tag
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git tag ${{ github.event.inputs.candidate_tag }}
          git push origin ${{ github.event.inputs.candidate_tag }}

  deploy-to-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: create-candidate-tag
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.inputs.candidate_tag }}
          persist-credentials: false

      - name: Deploy to staging
        run: |
          echo "TODO: Implement staging deployment for tag ${{ github.event.inputs.candidate_tag }}"

  send-to-charmhub:
    name: Send to Charmhub
    runs-on: ubuntu-latest
    needs: create-candidate-tag
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.inputs.candidate_tag }}
          persist-credentials: false

      - name: Send to Charmhub
        run: |
          echo "TODO: Implement Charmhub deployment for tag ${{ github.event.inputs.candidate_tag }}"

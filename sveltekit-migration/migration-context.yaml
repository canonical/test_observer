# Migration Context — SvelteKit Rewrite + UI Redesign

current_phase: 2        # 1=arch, 2=design, 3=build, 4=final-qa
current_step: 1         # within build phase (1-8)
completed_steps: []
issues: []
blueprint_approved: true
design_approved: false

# ─── Project goals ────────────────────────────────────────────────────────────

# This effort is a REDESIGN, not a pixel-perfect port.
# Use Pragma components and Canonical design principles.
# The existing Flutter UI is a reference for capabilities, not a design template.

# Critical extensibility goal (IN SCOPE for this redesign):
# Test Observer currently handles snaps/debs/charms/images with hard-coded,
# family-specific routes and logic.  The new UI must make it trivially easy to
# add a new artefact family: the only change required should be adding an entry
# to config.yaml.  Zero code changes.  See AGENTS.md for the "no
# artefact-specific logic" constraint.
extensibility_goal: |
  Routes, navigation items, and dashboard views must be driven entirely by the
  tabs list in config.yaml.  No family name (snap, deb, charm, image) may
  appear as a literal string in source code, route matchers, or conditional
  branches.  Adding a new family = editing config.yaml only.

# ─── SvelteKit deployment ──────────────────────────────────────────────────────

# The SvelteKit UI is deployed alongside the existing Flutter UI.
# Flutter UI stays at its current URLs (e.g. /snaps, /test-results, ...).
# SvelteKit UI is served under base_path (e.g. /svelte/).
#
# base_path is the single source of truth: it is read into svelte.config.js
# via the BASE_PATH env var.  To cut over to SvelteKit as the main UI, set
# BASE_PATH="" (empty string) and redeploy — zero code changes required.
base_path: "/svelte"
base_path_env_var: BASE_PATH

# ─── Source reference ─────────────────────────────────────────────────────────

flutter_app_path: frontend/
backend_api_path: backend/test_observer/controllers/
backend_base_url: http://localhost:30000
api_prefix: /v1

# ─── Pragma ───────────────────────────────────────────────────────────────────

pragma_repo: https://github.com/canonical/pragma
# Current monorepo version (all packages share one version number):
pragma_version: "0.27.0"

# Svelte-specific packages (use ONLY these for Svelte — do NOT use React packages):
pragma_svelte_pkg: "@canonical/svelte-ds-app-launchpad"   # components
pragma_svelte_icons_pkg: "@canonical/svelte-icons"         # icons (dep of above)
pragma_design_tokens_pkg: "@canonical/launchpad-design-tokens"  # CSS tokens (dep of above)
# NB: @canonical/styles is for the *React/vanilla* Canonical DS — do NOT import it.
# NB: @canonical/ds-assets is the *React* icon package — do NOT import it.

# ─── Design System ────────────────────────────────────────────────────────────

design_system_repo: https://github.com/canonical/design-system   # private; use GitHub token
github_token_path: ~/.github_llm_ro_token   # read-only token at this absolute path

# ─── Runtime config (from frontend/assets/config.yaml) ───────────────────────

require_authentication: false
tabs:
  - snaps
  - debs
  - charms
  - images
# The tabs list is the only place family names are configured.
# The new SvelteKit app must read this at runtime or build time.

# ─── Key models to port (from frontend/lib/models/) ──────────────────────────

models:
  - Artefact
  - ArtefactBuild
  - ArtefactVersion
  - ArtefactEnvironment
  - AttachmentRule
  - AttachmentRuleFilters
  - Environment
  - EnvironmentIssue
  - EnvironmentReview
  - ExecutionMetadata
  - FamilyName             # enum values driven by config, not hardcoded
  - Issue
  - IssueAttachment
  - RerunRequest
  - StageName              # enum
  - TestEvent
  - TestExecution
  - TestExecutionRelevantLink
  - TestIssue
  - TestResult
  - TestResultsFilters
  - User
  - UserNotification
  - ViewModes

# ─── API endpoints (from backend/test_observer/controllers/router.py) ─────────
